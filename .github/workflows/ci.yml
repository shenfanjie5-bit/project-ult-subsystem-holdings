name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install contracts
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@v0.1.3"
      - name: Install subsystem SDK
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-subsystem-sdk.git@v0.1.2"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Tests
        run: python -m pytest -q
